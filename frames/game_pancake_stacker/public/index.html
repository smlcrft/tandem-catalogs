<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pancake Stacker</title>
  <link rel="stylesheet" href="/dynamic/frame-prefs.css">
  <style>
    :root { --ch: var(--os-c8); }  /* warm orange — pancake-y */
    body { margin: 0; font-family: var(--os-font-sans); background: var(--os-bg); color: var(--os-text);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      padding: var(--os-sp-md); gap: var(--os-sp-sm); user-select: none; -webkit-user-select: none; }
    h1 { margin: 0; font-size: var(--os-fs-sm); font-weight: var(--os-weight-medium);
      color: var(--os-text-muted); text-transform: uppercase; letter-spacing: 0.08em;
      font-family: var(--os-font-mono); }
    .hud { display: flex; gap: var(--os-sp-xl); font-family: var(--os-font-mono);
      font-size: var(--os-fs-sm); color: var(--os-text-muted); }
    .hud strong { color: var(--os-text); font-size: var(--os-fs-lg); font-weight: var(--os-weight-bold);
      font-variant-numeric: tabular-nums; margin-left: var(--os-sp-xs); }
    .stage { position: relative; line-height: 0; }
    canvas { border: 1px solid var(--os-border-color); border-radius: var(--os-radius-md);
      background: linear-gradient(180deg, #cfe0ee 0%, #f5e1bd 100%); cursor: pointer;
      touch-action: none; box-shadow: 0 2px 12px rgba(0,0,0,0.06); display: block; }
    .hint { font-family: var(--os-font-mono); font-size: var(--os-fs-2xs);
      color: var(--os-text-muted); text-align: center; }
    .modal-backdrop { position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; background: rgba(20, 18, 14, 0.45); backdrop-filter: blur(2px);
      border-radius: var(--os-radius-md); animation: fade-in 180ms var(--os-ease-spring); }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    .gameover { padding: var(--os-sp-md) var(--os-sp-lg); border: 1px solid var(--os-border-color);
      border-radius: var(--os-radius-md); background: var(--os-bg-surface); text-align: center;
      min-width: 220px; box-shadow: 0 8px 32px rgba(0,0,0,0.25); line-height: normal;
      animation: pop-in 220ms var(--os-ease-spring); }
    @keyframes pop-in { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .gameover h2 { margin: 0 0 var(--os-sp-xs); font-size: var(--os-fs-lg);
      font-weight: var(--os-weight-semibold); color: var(--os-text); }
    .gameover p { margin: 0 0 var(--os-sp-sm); color: var(--os-text-muted); font-size: var(--os-fs-sm); }
    .gameover button { font: inherit; font-size: var(--os-fs-md); border: 0; cursor: pointer;
      border-radius: var(--os-radius-md); padding: var(--os-sp-sm) var(--os-sp-lg);
      background: var(--ch); color: white;
      transition: filter 150ms var(--os-ease-spring), transform 150ms var(--os-ease-spring); }
    .gameover button:hover { filter: brightness(1.08); }
    .gameover button:active { transform: scale(0.97); }
    .holder { font-family: var(--os-font-mono); font-size: var(--os-fs-2xs);
      color: var(--os-text-muted); }
  </style>
</head>
<body>
  <h1><i class="ph-light ph-stack"></i> Pancake Stacker</h1>
  <div class="hud">
    <span>Stack <strong id="score">0</strong></span>
    <span>Best <strong id="best">0</strong></span>
  </div>
  <div class="stage">
    <canvas id="game" width="360" height="480"></canvas>
    <div id="result"></div>
  </div>
  <div class="hint">click · tap · spacebar to drop</div>

  <script type="module">
    import { frame } from "/lib/js/framelib.js";

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;
    const PANCAKE_H = 22;
    const START_WIDTH = 150;
    const START_SPEED = 2.4;
    const TOP_MARGIN = 80;   // pixels of headroom kept above the stack
    const HOVER_Y = 30;      // y where the moving pancake hovers
    const FALL_SPEED = 14;
    const MIN_OVERLAP = 6;   // sliver thinner than this counts as a total miss

    let stack = [];   // bottom-up array of { x, w }
    let scrollY = 0;
    let moving = null;
    let dropping = null;
    let score = 0;
    let best = 0;
    let holder = "";
    let alive = true;
    let started = false;

    const $score = document.getElementById('score');
    const $best  = document.getElementById('best');
    const $result = document.getElementById('result');

    async function loadState() {
      try {
        const s = await frame.api('api/state');
        best = s.score?.high ?? 0;
        holder = s.score?.holder || "";
        $best.textContent = best;
      } catch (_) {}
    }

    function stackTopY() {
      return H - stack.length * PANCAKE_H + scrollY;
    }

    function reset() {
      alive = true;
      started = true;
      stack = [{ x: (W - START_WIDTH) / 2, w: START_WIDTH }];
      scrollY = 0;
      score = 0;
      $score.textContent = '0';
      $result.innerHTML = '';
      spawnMoving();
    }

    function spawnMoving() {
      const top = stack[stack.length - 1];
      const speed = START_SPEED + Math.min(score * 0.18, 5.5);
      // Alternate starting side so it's not always coming from the left.
      const fromLeft = (score % 2) === 0;
      moving = {
        x: fromLeft ? 0 : (W - top.w),
        w: top.w,
        dir: fromLeft ? 1 : -1,
        speed,
      };
    }

    function drop() {
      if (!alive) { reset(); return; }
      if (!moving || dropping) return;
      const top = stack[stack.length - 1];
      const left = Math.max(moving.x, top.x);
      const right = Math.min(moving.x + moving.w, top.x + top.w);
      const overlap = right - left;
      const startY = HOVER_Y;

      if (overlap < MIN_OVERLAP) {
        // Total miss — fall off the side of the stack.
        dropping = { x: moving.x, w: moving.w, y: startY, targetY: H + 80, miss: true };
        moving = null;
        return;
      }
      dropping = { x: left, w: overlap, y: startY, targetY: stackTopY() - PANCAKE_H, miss: false };
      moving = null;
    }

    function update() {
      if (moving) {
        moving.x += moving.dir * moving.speed;
        if (moving.x <= 0)              { moving.x = 0;             moving.dir =  1; }
        if (moving.x + moving.w >= W)   { moving.x = W - moving.w;  moving.dir = -1; }
      }
      if (dropping) {
        dropping.y += FALL_SPEED;
        if (!dropping.miss && dropping.y >= dropping.targetY) {
          dropping.y = dropping.targetY;
          stack.push({ x: dropping.x, w: dropping.w });
          score += 1;
          $score.textContent = String(score);
          // Scroll the stack down so the action stays in view near the top.
          while (stackTopY() < TOP_MARGIN) scrollY += PANCAKE_H;
          dropping = null;
          spawnMoving();
        } else if (dropping.miss && dropping.y >= dropping.targetY) {
          dropping = null;
          endGame();
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      // Subtle griddle shimmer line near the top.
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, HOVER_Y + PANCAKE_H + 10);
      ctx.lineTo(W, HOVER_Y + PANCAKE_H + 10);
      ctx.stroke();

      // Stack (bottom-up).
      for (let i = 0; i < stack.length; i++) {
        const p = stack[i];
        const y = H - (i + 1) * PANCAKE_H + scrollY;
        if (y < -PANCAKE_H || y > H) continue;
        drawPancake(p.x, y, p.w, i, i === stack.length - 1);
      }

      if (moving)   drawPancake(moving.x, HOVER_Y, moving.w, stack.length, false);
      if (dropping) drawPancake(dropping.x, dropping.y, dropping.w, stack.length, false);

      if (!started) {
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.font = '600 14px var(--os-font-mono, monospace)';
        ctx.textAlign = 'center';
        ctx.fillText('press space / tap to start', W / 2, H / 2);
      }
    }

    function drawPancake(x, y, w, i, withSyrup) {
      const hue = 32 + (i % 5) * 4;
      const light = 74 - (i % 6);
      ctx.fillStyle = `hsl(${hue}, 58%, ${light}%)`;
      ctx.strokeStyle = `hsl(${hue}, 50%, 38%)`;
      ctx.lineWidth = 2;
      const r = Math.min(8, w / 2);
      roundRect(x, y, w, PANCAKE_H, r);
      ctx.fill();
      ctx.stroke();
      // Browning rim highlight.
      ctx.fillStyle = `hsla(${hue}, 60%, 30%, 0.18)`;
      roundRect(x, y + PANCAKE_H - 5, w, 4, 2);
      ctx.fill();
      if (withSyrup && w > 30) {
        ctx.fillStyle = 'rgba(120, 60, 20, 0.55)';
        ctx.beginPath();
        const sx = x + w * 0.35;
        ctx.ellipse(sx, y + 4, w * 0.18, 3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(sx - w * 0.16, y + 5);
        ctx.quadraticCurveTo(sx, y + 12, sx + w * 0.16, y + 5);
        ctx.lineTo(sx + w * 0.16, y + 4);
        ctx.lineTo(sx - w * 0.16, y + 4);
        ctx.closePath();
        ctx.fill();
      }
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    async function endGame() {
      alive = false;
      const beat = score > best;
      try {
        const r = await frame.api('api/submit', { score });
        if (r.new_record) {
          best = r.score.high;
          holder = r.score.holder || holder;
          $best.textContent = best;
        }
      } catch (_) {}
      const headline = beat ? 'New best!' : (score > 0 ? 'Stack toppled.' : 'Whiffed.');
      const holderLine = holder ? `<div class="holder">best held by ${escapeHTML(holder)}</div>` : '';
      $result.innerHTML = `
        <div class="modal-backdrop" id="modal">
          <div class="gameover">
            <h2>${headline}</h2>
            <p>You stacked ${score} pancake${score === 1 ? '' : 's'}.</p>
            ${holderLine}
            <div style="margin-top:8px"><button id="again">Play again</button></div>
          </div>
        </div>`;
      document.getElementById('again').addEventListener('click', reset);
    }

    function escapeHTML(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    canvas.addEventListener('mousedown', drop);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drop(); }, { passive: false });
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); drop(); }
    });

    loadState().then(() => {
      reset();
      loop();
    });
  </script>
</body>
</html>
