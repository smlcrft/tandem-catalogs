<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Roundtable</title>
  <link rel="stylesheet" href="/dynamic/frame-prefs.css">
  <link rel="stylesheet" href="./index.css">
</head>
<body>
  <main id="app" class="rt-loading"></main>
  <script type="module">
import { frame, html, render, useState, useEffect, useRef, Fragment, useFramePush, Editable } from "/lib/js/framelib.js";

const peer = window.__peer || {};
const isSfiMember = !!peer.is_sfi_member;
const isOwner = !!peer.is_owner;
const userId = peer.user_id || "";

const THEME_KEYS = ["c1", "c2", "c3", "c4", "c5", "c6", "c7", "c8", "c9", "c10", "c11", "c12"];
const DEFAULT_PREFS = { title: "Roundtable", theme: "c1", positive_label: "Positives", negative_label: "Negatives", public_to_space_viewers: false, public_read_view: false };

const api = frame.api;

function fmtTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const hh = String(d.getHours()).padStart(2, "0");
  const mm = String(d.getMinutes()).padStart(2, "0");
  if (d.toDateString() === now.toDateString()) return `${hh}:${mm}`;
  const days = (now - d) / 86400000;
  if (days < 7) return d.toLocaleDateString(undefined, { weekday: "short" }) + ` ${hh}:${mm}`;
  return d.toLocaleDateString();
}

function sortItems(list) {
  list.sort((a, b) => {
    if (b.votes !== a.votes) return b.votes - a.votes;
    if (b.created_at !== a.created_at) return b.created_at - a.created_at;
    return b.id - a.id;
  });
  return list;
}

// =====================================================================================
// Private notice (anon / non-member)
// =====================================================================================
function PrivateNotice({ reason }) {
  const sub = reason === "anon"
    ? "This Roundtable is private to its space members. Open it from the Tandem app, or ask the owner to enable read-only public view in this frame's settings."
    : "This Roundtable is private to its space members. Ask the owner to invite you to the space, or to enable read-only public view in this frame's settings.";
  return html`<${Fragment}>
    <i class="ph-light ph-lock-key"></i>
    <div class="rt-private-title">Private Roundtable</div>
    <div class="rt-private-sub">${sub}</div>
  </${Fragment}>`;
}

// =====================================================================================
// Settings overlay
// =====================================================================================
function SettingsOverlay({ prefs, onClose, onSave }) {
  const [title, setTitle] = useState(prefs.title);
  const [positiveLabel, setPositiveLabel] = useState(prefs.positive_label);
  const [negativeLabel, setNegativeLabel] = useState(prefs.negative_label);
  const [theme, setTheme] = useState(prefs.theme);
  const [publicToSpaceViewers, setPublicToSpaceViewers] = useState(!!prefs.public_to_space_viewers);
  const [publicReadView, setPublicReadView] = useState(!!prefs.public_read_view);

  const save = () => {
    onSave({
      title: title.trim() || "Roundtable",
      theme,
      positive_label: positiveLabel.trim() || "Positives",
      negative_label: negativeLabel.trim() || "Negatives",
      public_to_space_viewers: publicToSpaceViewers,
      public_read_view: publicReadView,
    });
  };

  return html`<div class="rt-settings">
    <div class="rt-settings-header">
      <h2>Roundtable settings</h2>
      <button class="rt-icon-btn" title="close" onClick=${onClose}><i class="ph-light ph-x"></i></button>
    </div>
    <label>
      Title
      <input type="text" maxlength="80" placeholder="Roundtable"
        value=${title} onInput=${(e) => setTitle(e.target.value)} />
    </label>
    <label>
      Positives label
      <input type="text" maxlength="40" placeholder="Positives"
        value=${positiveLabel} onInput=${(e) => setPositiveLabel(e.target.value)} />
    </label>
    <label>
      Negatives label
      <input type="text" maxlength="40" placeholder="Negatives"
        value=${negativeLabel} onInput=${(e) => setNegativeLabel(e.target.value)} />
    </label>
    <label>
      Theme color
      <div class="rt-themes">
        ${THEME_KEYS.map((k) => html`<button type="button" key=${k}
          class=${"rt-theme-swatch " + (k === theme ? "selected" : "")}
          style=${`background: var(--os-${k});`}
          title=${k}
          onClick=${() => setTheme(k)}></button>`)}
      </div>
    </label>
    <label class="rt-toggle-label">
      <span class="rt-toggle-text">
        <span class="rt-toggle-title">Let Viewer-role space members contribute</span>
        <span class="rt-toggle-sub">When on, members of this space whose role is Viewer can chat, add items, and vote — not just read. Editors, Admins, and the Owner always participate; this toggle has no effect on non-members.</span>
      </span>
      <button type="button" class="rt-toggle" role="switch" aria-checked=${publicToSpaceViewers ? "true" : "false"}
        onClick=${() => setPublicToSpaceViewers((v) => !v)}><span class="rt-toggle-thumb"></span></button>
    </label>
    <label class="rt-toggle-label">
      <span class="rt-toggle-text">
        <span class="rt-toggle-title">Allow read-only view by anonymous / web visitors</span>
        <span class="rt-toggle-sub">When on, anyone with the link — including unauthenticated web visitors — can see this Roundtable in a read-only view. They cannot post, vote, or delete.</span>
      </span>
      <button type="button" class="rt-toggle" role="switch" aria-checked=${publicReadView ? "true" : "false"}
        onClick=${() => setPublicReadView((v) => !v)}><span class="rt-toggle-thumb"></span></button>
    </label>
    <div class="rt-settings-actions">
      <button class="rt-icon-btn" style="padding: 4px 10px;" onClick=${onClose}>Cancel</button>
      <button class="rt-save" onClick=${save}>Save</button>
    </div>
  </div>`;
}

// =====================================================================================
// List column
// =====================================================================================
function ListColumn({ kind, items, prefs, canParticipate, collapsed, onToggleCollapse, onAdd, onVote, onDelete }) {
  const [draft, setDraft] = useState("");
  const label = kind === "positive" ? prefs.positive_label : prefs.negative_label;
  const icon = kind === "positive" ? "thumbs-up" : "warning-circle";
  const placeholder = kind === "positive" ? "Add a feature or task…" : "Add an issue or bug…";

  const submit = (e) => {
    e.preventDefault();
    const text = draft.trim();
    if (!text) return;
    setDraft("");
    onAdd(kind, text);
  };

  return html`<section class=${"rt-col " + (collapsed ? "collapsed" : "")} data-kind=${kind}>
    <div class="rt-col-header" title="click to collapse" onClick=${onToggleCollapse}>
      <span class="label"><i class=${"ph-light ph-" + icon}></i>${label}</span>
      <span class="trailing">
        <span class="count">${items.length}</span>
        <i class="ph-light ph-caret-down chev"></i>
      </span>
    </div>
    ${canParticipate && html`<form class="rt-item-composer" autocomplete="off" onSubmit=${submit}>
      <input type="text" maxlength="280" placeholder=${placeholder}
        value=${draft} onInput=${(e) => setDraft(e.target.value)} />
      <button type="submit" disabled=${!draft.trim()} title="Add"><i class="ph-light ph-plus"></i></button>
    </form>`}
    <div class="rt-list">
      ${items.length === 0
        ? html`<div class="rt-list-empty">
            <i class="ph-light ph-circles-three"></i>
            <span>${kind === "positive" ? "No positives yet — what should we build next?" : "No negatives yet — what's blocking us?"}</span>
          </div>`
        : items.map((it) => html`<${ListItem} key=${it.id} item=${it}
            canParticipate=${canParticipate}
            onVote=${() => onVote(kind, it.id)}
            onDelete=${() => onDelete(kind, it.id)} />`)}
    </div>
  </section>`;
}

function ListItem({ item: it, canParticipate, onVote, onDelete }) {
  const mine = it.user_id === userId;
  const canDelete = canParticipate && (mine || isOwner);
  const voteTitle = canParticipate ? (it.i_voted ? "remove +1" : "+1") : "vote count";
  return html`<div class="rt-item" data-id=${it.id}>
    <button class=${"rt-vote " + (it.i_voted ? "mine " : "") + (canParticipate ? "" : "readonly")}
      disabled=${!canParticipate}
      title=${voteTitle}
      onClick=${canParticipate ? onVote : undefined}>
      <i class="ph-light ph-caret-up"></i>
      <span class="count">${it.votes}</span>
    </button>
    <div class="rt-item-body">
      <div class="rt-item-text">${it.body}</div>
      <div class="rt-item-meta">
        <span class="by">${it.user_name || "user"}</span>
        <span class="when">${fmtTime(it.created_at)}</span>
      </div>
    </div>
    <div class="rt-item-actions">
      ${canDelete && html`<button class="rt-item-delete"
        title=${mine ? "remove your item" : "remove item"}
        onClick=${onDelete}><i class="ph-light ph-trash"></i></button>`}
    </div>
  </div>`;
}

// =====================================================================================
// Chat strip
// =====================================================================================
function ChatStrip({ messages, canParticipate, collapsed, onToggleCollapse, onSend, onDeleteMessage }) {
  const [draft, setDraft] = useState("");
  const taRef = useRef(null);
  const messagesRef = useRef(null);
  const prevLen = useRef(messages.length);

  const autosize = () => {
    const t = taRef.current;
    if (!t) return;
    t.style.height = "auto";
    t.style.height = Math.min(t.scrollHeight, 96) + "px";
  };

  useEffect(() => {
    const el = messagesRef.current;
    if (!el) return;
    const wasAtBottom = (el.scrollHeight - el.scrollTop - el.clientHeight) < 32;
    if (wasAtBottom || messages.length > prevLen.current) {
      if (!collapsed) el.scrollTop = el.scrollHeight;
    }
    prevLen.current = messages.length;
  }, [messages, collapsed]);

  const submit = (e) => {
    e.preventDefault();
    const body = draft.trim();
    if (!body) return;
    setDraft("");
    setTimeout(autosize, 0);
    onSend(body);
  };

  let lastUserId = "";
  let lastTs = 0;

  return html`<div class=${"rt-chat " + (collapsed ? "collapsed" : "")}>
    <div class="rt-chat-header" onClick=${onToggleCollapse}>
      <span class="label"><i class="ph-light ph-chat-circle"></i> Discussion</span>
      <span class="count">${messages.length}</span>
      <i class="ph-light ph-caret-down chev"></i>
    </div>
    <div class="rt-chat-body">
      <div class="rt-messages" ref=${messagesRef}>
        ${messages.length === 0
          ? html`<div class="rt-empty">No messages yet — say hi!</div>`
          : messages.map((m) => {
            const sameAuthor = m.user_id === lastUserId && (m.created_at - lastTs) < 5 * 60 * 1000;
            const mine = m.user_id === userId;
            lastUserId = m.user_id;
            lastTs = m.created_at;
            const canDelete = canParticipate && (mine || isOwner);
            return html`<div class=${"rt-msg " + (mine ? "mine " : "") + (sameAuthor ? "" : "first")} key=${m.id} data-id=${m.id}>
              ${!sameAuthor && html`<div class="rt-msg-meta">
                <span class="author">${m.user_name || "user"}</span>
                <span class="time">${fmtTime(m.created_at)}</span>
                ${canDelete && html`<button type="button" class="rt-msg-delete" title="delete"
                  onClick=${() => onDeleteMessage(m.id)}><i class="ph-light ph-trash"></i></button>`}
              </div>`}
              <div class="rt-msg-body">${m.body}</div>
            </div>`;
          })}
      </div>
      ${canParticipate && html`<form class="rt-composer" autocomplete="off" onSubmit=${submit}>
        <textarea ref=${taRef} rows="1" placeholder="Write a message..." maxlength="4000"
          value=${draft}
          onInput=${(e) => { setDraft(e.target.value); autosize(); }}
          onKeyDown=${(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submit(e); } }} />
        <button type="submit" class="rt-send" title="Send" disabled=${!draft.trim()}>
          <i class="ph-light ph-paper-plane-tilt"></i>
        </button>
      </form>`}
    </div>
  </div>`;
}

// =====================================================================================
// Badges
// =====================================================================================
function Badges({ prefs }) {
  if (!isSfiMember) return null;
  return html`<${Fragment}>
    ${prefs.public_to_space_viewers && html`<span class="rt-badge rt-badge-open"
      title="Viewer-role members of this space can contribute, not just observe."><i class="ph-light ph-users-three"></i>viewers contribute</span>`}
    ${prefs.public_read_view && html`<span class="rt-badge rt-badge-public"
      title="Anyone with the link can view this Roundtable in read-only mode."><i class="ph-light ph-globe-hemisphere-west"></i>public</span>`}
  </${Fragment}>`;
}

// =====================================================================================
// App
// =====================================================================================
function App() {
  const [state, setState] = useState(null);
  const [err, setErr] = useState(null);
  const [privateReason, setPrivateReason] = useState(null);
  const [toast, setToast] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [chatCollapsed, setChatCollapsed] = useState(false);
  const [listCollapsed, setListCollapsed] = useState({ positive: false, negative: false });

  useEffect(() => {
    api("./api/state")
      .then((data) => {
        setState({
          prefs: { ...DEFAULT_PREFS, ...(data.prefs || {}) },
          messages: data.messages || [],
          positives: data.positives || [],
          negatives: data.negatives || [],
          canEditSettings: !!data.can_edit_settings,
          canParticipate: !!data.can_participate,
        });
      })
      .catch((e) => {
        if (String(e.message || "").indexOf("private frame") >= 0) {
          setPrivateReason(isSfiMember ? "non-member" : (userId ? "non-member" : "anon"));
        } else {
          setErr(e.message || String(e));
        }
      });
  }, []);

  useFramePush({
    rt_message: (d) => setState((prev) => {
      if (!prev || prev.messages.some((m) => m.id === d.message.id)) return prev;
      return { ...prev, messages: [...prev.messages, d.message] };
    }),
    rt_message_delete: (d) => setState((prev) => prev ? { ...prev, messages: prev.messages.filter((m) => m.id !== d.id) } : prev),
    rt_item_add: (d) => setState((prev) => {
      if (!prev) return prev;
      const list = d.kind === "positive" ? prev.positives : prev.negatives;
      if (list.some((x) => x.id === d.item.id)) return prev;
      const incoming = { ...d.item, i_voted: d.item.user_id === userId ? d.item.i_voted : false };
      const next = sortItems([...list, incoming]);
      return d.kind === "positive" ? { ...prev, positives: next } : { ...prev, negatives: next };
    }),
    rt_item_delete: (d) => setState((prev) => {
      if (!prev) return prev;
      if (d.kind === "positive") return { ...prev, positives: prev.positives.filter((x) => x.id !== d.id) };
      return { ...prev, negatives: prev.negatives.filter((x) => x.id !== d.id) };
    }),
    rt_item_vote: (d) => setState((prev) => {
      if (!prev) return prev;
      const list = d.kind === "positive" ? prev.positives : prev.negatives;
      const next = sortItems(list.map((x) => x.id === d.id ? { ...x, votes: d.votes } : x));
      return d.kind === "positive" ? { ...prev, positives: next } : { ...prev, negatives: next };
    }),
    rt_prefs: (d) => setState((prev) => prev ? { ...prev, prefs: { ...prev.prefs, ...d.prefs } } : prev),
  });

  useEffect(() => {
    if (!toast) return;
    const id = setTimeout(() => setToast(null), 2000);
    return () => clearTimeout(id);
  }, [toast]);

  // Apply theme to host element + lists-all-collapsed class.
  useEffect(() => {
    const root = document.getElementById("app");
    const t = THEME_KEYS.includes(state?.prefs?.theme) ? state.prefs.theme : "c1";
    root.style.setProperty("--ch", `var(--os-${t})`);
    root.style.setProperty("--ch-fg", `var(--os-${t}-fg)`);
  }, [state?.prefs?.theme]);

  useEffect(() => {
    const root = document.getElementById("app");
    if (!root) return;
    if (privateReason) {
      root.className = "rt-private";
    } else if (state) {
      root.className = "rt-root" + (listCollapsed.positive && listCollapsed.negative ? " lists-all-collapsed" : "");
    } else {
      root.className = "rt-loading";
    }
  }, [privateReason, state, listCollapsed]);

  const fail = (label) => (e) => setToast(e.message || (label + " failed"));

  if (privateReason) return html`<${PrivateNotice} reason=${privateReason} />`;
  if (err) return html`failed to load: ${err}`;
  if (!state) return "loading…";

  const { prefs, messages, positives, negatives, canEditSettings, canParticipate } = state;

  const sendMessage = (body) => api("./api/send", { body }).catch(fail("send"));
  const deleteMessage = (id) => api("./api/delete-message", { id }).catch(fail("delete"));

  const addItem = (kind, text) => api("./api/item-add", { kind, body: text }).catch(fail("add"));
  const voteItem = (kind, id) => {
    // Optimistic update.
    setState((prev) => {
      if (!prev) return prev;
      const list = kind === "positive" ? prev.positives : prev.negatives;
      const next = sortItems(list.map((x) => x.id === id
        ? { ...x, i_voted: !x.i_voted, votes: x.votes + (x.i_voted ? -1 : 1) }
        : x));
      return kind === "positive" ? { ...prev, positives: next } : { ...prev, negatives: next };
    });
    api("./api/item-vote", { id }).catch((e) => {
      // Roll back on failure.
      setState((prev) => {
        if (!prev) return prev;
        const list = kind === "positive" ? prev.positives : prev.negatives;
        const next = sortItems(list.map((x) => x.id === id
          ? { ...x, i_voted: !x.i_voted, votes: x.votes + (x.i_voted ? -1 : 1) }
          : x));
        return kind === "positive" ? { ...prev, positives: next } : { ...prev, negatives: next };
      });
      setToast(e.message || "vote failed");
    });
  };
  const deleteItem = async (kind, id) => {
    const ok = await frame.confirm("Are you sure you want to delete this item?", { danger: true, okLabel: "Delete" });
    if (!ok) return;
    api("./api/item-delete", { id }).catch(fail("delete"));
  };

  const saveSettings = async (next) => {
    try {
      const data = await api("./api/settings", next);
      if (data && data.prefs) {
        setState((s) => s ? { ...s, prefs: { ...s.prefs, ...data.prefs } } : s);
      }
      setShowSettings(false);
    } catch (e) {
      setToast(e.message || "save failed");
    }
  };
  const saveTitle = (title) => saveSettings({ ...prefs, title });

  const toggleListCollapsed = (kind) => setListCollapsed((c) => ({ ...c, [kind]: !c[kind] }));

  return html`<${Fragment}>
    <div class="rt-accent"></div>
    <div class="rt-topline">
      <${Editable} class="rt-title-input" maxlength="80" placeholder="Roundtable"
        disabled=${!canEditSettings}
        value=${prefs.title}
        onSave=${(v) => saveTitle(v.trim() || "Roundtable")} />
      <${Badges} prefs=${prefs} />
      ${canEditSettings && html`<button class="rt-icon-btn" title="settings"
        onClick=${() => setShowSettings(true)}><i class="ph-light ph-dots-three"></i></button>`}
    </div>
    <div class="rt-main">
      <${ListColumn} kind="positive" items=${positives} prefs=${prefs}
        canParticipate=${canParticipate} collapsed=${listCollapsed.positive}
        onToggleCollapse=${() => toggleListCollapsed("positive")}
        onAdd=${addItem} onVote=${voteItem} onDelete=${deleteItem} />
      <${ListColumn} kind="negative" items=${negatives} prefs=${prefs}
        canParticipate=${canParticipate} collapsed=${listCollapsed.negative}
        onToggleCollapse=${() => toggleListCollapsed("negative")}
        onAdd=${addItem} onVote=${voteItem} onDelete=${deleteItem} />
    </div>
    <${ChatStrip} messages=${messages} canParticipate=${canParticipate}
      collapsed=${chatCollapsed}
      onToggleCollapse=${() => setChatCollapsed((v) => !v)}
      onSend=${sendMessage}
      onDeleteMessage=${deleteMessage} />
    ${showSettings && html`<${SettingsOverlay} prefs=${prefs}
      onClose=${() => setShowSettings(false)}
      onSave=${saveSettings} />`}
    ${toast && html`<div class="rt-toast show">${toast}</div>`}
  </${Fragment}>`;
}

render(html`<${App}/>`, document.getElementById("app"));
  </script>
</body>
</html>
