<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skeleton</title>
  <link rel="stylesheet" href="dyn/frame-prefs.css"> <!-- baseline CSS variables dynamically defined here. Can vary by placement/space. -->
  <style>
    :root {
      color-scheme: light dark;
      --bg:     #faf9f7;
      --fg:     #1a1a1a;
      --muted:  #6b6b6b;
      --accent: #3891a8;
      --border: #e4e1dc;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1a1a1a; --fg: #f0eee9; --muted: #9a9a9a; --border: #333; }
    }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--fg); }
    main { max-width: 640px; margin: 0 auto; padding: 32px 24px; }
    h1 { margin: 0 0 8px; font-size: 22px; font-weight: 600; }
    .muted { color: var(--muted); }
    .row { display: flex; gap: 8px; align-items: center; margin-top: 16px; }
    input { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px;
      background: var(--bg); color: var(--fg); font: inherit; }
    button { padding: 8px 14px; border: 1px solid var(--accent); border-radius: 6px;
      background: var(--accent); color: white; font: inherit; cursor: pointer; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .card { margin-top: 24px; padding: 16px; border: 1px solid var(--border); border-radius: 8px; }
    .card h2 { margin: 0 0 8px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }
    pre { margin: 0; font-size: 13px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <script type="module">
    import { frame, html, render, useState, useEffect } from "/lib/js/framelib.js";

    function SkeletonApp() {
      const [peer, setPeer] = useState(null);
      const [message, setMessage] = useState("");
      const [echo, setEcho] = useState(null);
      const [busy, setBusy] = useState(false);

      useEffect(() => {
        frame.api("api/whoami").then(setPeer).catch(e => console.error(e));
      }, []);

      async function send() {
        if (!message.trim()) return;
        setBusy(true);
        try {
          const res = await frame.api("api/echo", { message });
          setEcho(res.you_said);
          setMessage("");
        } finally {
          setBusy(false);
        }
      }

      return html`
        <main>
          <h1>Skeleton</h1>
          <p class="muted">Starter frame — Preact + htm + framelib. Replace this with your own UI.</p>

          <div class="row">
            <input
              type="text"
              placeholder="Type something…"
              value=${message}
              onInput=${e => setMessage(e.target.value)}
              onKeyDown=${e => e.key === "Enter" && send()}
            />
            <button onClick=${send} disabled=${busy || !message.trim()}>Send</button>
          </div>

          ${echo !== null && html`
            <div class="card">
              <h2>Echo</h2>
              <pre>${echo}</pre>
            </div>
          `}

          ${peer && html`
            <div class="card">
              <h2>You</h2>
              <pre>${JSON.stringify(peer, null, 2)}</pre>
            </div>
          `}
        </main>
      `;
    }

    render(html`<${SkeletonApp}/>`, document.body);
  </script>
</body>
</html>
